<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Shafia Tariq ❤️</title>

<style>
body{
margin:0;
padding:0;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#ff4e8b,#7b68ee);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
color:white;
text-align:center;
}

.card{
background:rgba(255,255,255,0.15);
padding:30px;
border-radius:20px;
backdrop-filter:blur(10px);
box-shadow:0 0 25px rgba(255,255,255,.3);
max-width:700px;
}

h1{
font-size:50px;
margin-bottom:10px;
}

p{
font-size:22px;
line-height:1.6;
}

button{
padding:15px 30px;
font-size:20px;
border:none;
border-radius:40px;
background:gold;
cursor:pointer;
margin-top:20px;
}

#msg{
display:none;
font-size:28px;
margin-top:25px;
color:#fff700;
font-weight:bold;
}
</style>
</head>

<body>

<div class="card">

<h1>🎂 Happy Birthday 🎂</h1>

<h2>💖 Shafia Tariq 💖</h2>

<p>
May Allah bless you with happiness, success,
good health and endless smiles.
</p>

<p>
Our school memories will always remain special.
Have a wonderful birthday! 🌹
</p>

<button onclick="showWish()">
🎁 Open Your Surprise
</button>

<div id="msg">
✨ Happy Birthday Shafia Tariq! ✨<br><br>
Stay blessed, keep smiling and enjoy your special day! ❤️🎉
</div>

</div>

<script>
function showWish(){
document.getElementById("msg").style.display="block";
}
</script>

</body>
</html>
